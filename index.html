<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Український Твіч</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="logo.png" alt="Logo" width="40" onerror="this.src='https://pwa.twitch.tv/assets/apple-touch-icon-120.png'">
            <h1>UA Twitch</h1>
        </div>
        <nav>
            <button id="btn-home">Головна</button>
            <button id="btn-hall">Зал Слави 🏆</button>
        </nav>
        <div id="auth-box">
            <button id="login-btn">Увійти</button>
        </div>
    </header>

    <main id="main-section">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Шукати стрімера (навіть якщо він офлайн)...">
        </div>
        <h2 id="status">Завантаження...</h2>
        <div id="streamers-grid" class="grid"></div>
    </main>

    <div id="hall-section" style="display:none;" class="container">
        <h2 class="hall-title">🏆 Зал Слави 🏆</h2>
        <div id="hall-content" class="grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
