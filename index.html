<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Український Твіч</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" id="logo-link">
                <img src="Twitch logo in Ukrainian colors-fotor-bg-remover-20260407183315.png" alt="Logo" width="40" onerror="this.src='https://pwa.twitch.tv/assets/apple-touch-icon-120.png'">
                <h1>Український Твіч</h1>
            </a>
        </div>
        <nav>
            <button id="show-main">Головна</button>
            <button id="show-hall">Зал Слави 🏆</button>
        </nav>
        <div id="auth-container">
            <button id="login-btn">Увійти через Twitch</button>
        </div>
    </header>

    <div class="container" id="main-content">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Пошук (знайдемо навіть офлайн)...">
        </div>
        <div id="status">Будь ласка, авторизуйтесь...</div>
        <div id="streamers-grid" class="grid"></div>
    </div>

    <div class="container" id="hall-of-fame" style="display: none;">
        <div id="hall-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
