<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Український Твіч</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" id="logo-link">
                <img src="logo.png" alt="UA" width="40" onerror="this.style.display='none'">
                <h1>Український Твіч</h1>
            </a>
        </div>
        <nav>
            <button id="btn-home">Головна</button>
            <button id="btn-hall">Зал Слави 🏆</button>
        </nav>
        <div id="auth-container">
            <button id="login-btn">Увійти через Twitch</button>
        </div>
    </header>

    <main id="main-section" class="container">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Кого шукаємо? (знайдемо навіть офлайн)">
        </div>
        
        <h2 id="status">Завантаження...</h2>
        
        <div id="streamers-grid" class="grid"></div>
    </main>

    <section id="hall-section" class="container" style="display: none;">
        <h2 class="hall-title">🏆 ПЕРЕМОЖЦІ STREAM AWARDS 2024: UKRAINIAN EDITION 🏆</h2>
        <div id="hall-2024" class="grid hall-grid"></div>

        <h2 class="hall-title" style="margin-top: 50px;">🏆 ПЕРЕМОЖЦІ STREAM AWARDS 2025: UKRAINIAN EDITION 🏆</h2>
        <div id="hall-2025" class="grid hall-grid"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
