<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Streamers Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 15H85V60L65 85H15V15Z" fill="black" stroke="black" stroke-width="4"/>
                <path d="M19 19H81V40H19V19Z" fill="#00AAFF"/>
                <path d="M19 40H81V61L66 81H19V40Z" fill="#FFE600"/>
                <rect x="35" y="27" width="10" height="20" fill="white"/>
                <rect x="55" y="27" width="10" height="20" fill="white"/>
            </svg>
            <h1 style="margin: 0; font-size: 1.5rem;">UA Streamers</h1>
        </div>
        <button id="login-btn">Увійти через Twitch</button>
    </header>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Пошук за ніком...">
            <select id="category-filter">
                <option value="all">Всі категорії</option>
                <option value="Just Chatting">Тільки спілкування</option>
                <option value="Minecraft">Minecraft</option>
                <option value="Dota 2">Dota 2</option>
                <option value="Counter-Strike">CS 2 / CS:GO</option>
                <option value="Valorant">Valorant</option>
                <option value="Grand Theft Auto V">GTA V</option>
                <option value="League of Legends">League of Legends</option>
                <option value="Apex Legends">Apex Legends</option>
                <option value="Fortnite">Fortnite</option>
                <option value="PUBG: BATTLEGROUNDS">PUBG</option>
                <option value="Software and Game Development">Програмування</option>
            </select>
        </div>

        <div id="status">Завантаження...</div>
        <div id="streamers-grid" class="grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
